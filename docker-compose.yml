services:
  qfis:
    build: .
    ports:
      - "${PORT:-21465}:21465"
    environment:
      - GIN_MODE=release
      - PORT=21465
      - QFIS_DB_PATH=/app/data/qfis.db
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - qfis-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:21465/api/v1/dashboard/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qfis-data:
